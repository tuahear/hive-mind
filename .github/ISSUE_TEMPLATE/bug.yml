name: Bug report
description: Report a bug in hive-mind
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit SHA or release tag.
      placeholder: "commit abc1234 / v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (native)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the bug, plus any relevant logs or config.
    validations:
      required: true
